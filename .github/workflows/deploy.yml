name: Deploy

# Auto-deploy the CRM Worker (OpenNext -> Cloudflare) on every push to main.
# Requires repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID, plus the
# same NEXT_PUBLIC_SUPABASE_* repo variables the CI build already uses.
# Runtime secrets (Stripe/Meta/Supabase service key/POS_CRED_ENC_KEY/...) live as
# Cloudflare Worker secrets and are NOT touched by `wrangler deploy`.

on:
  push:
    branches:
      - main

# One deploy at a time; a newer push cancels an in-flight one.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # opennextjs-cloudflare build (bundles the Next output) + deploy (wrangler).
      - run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
